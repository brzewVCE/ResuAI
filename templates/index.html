<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title> <!-- Changed title -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- CDNs: marked, iconify, katex -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body);"></script>
    <style>
        /* Add some basic styling for the new form UI */
        .form-editor-pane { padding: 15px; border: 1px solid #ddd; background-color: #f9f9f9; margin-bottom:20px; border-radius: 4px;}
        .form-editor-pane h3 { margin-top: 0; color: #3498db; border-bottom: 1px solid #eee; padding-bottom: 5px;}
        .form-section { margin-bottom: 20px; padding: 15px; border: 1px solid #e0e0e0; background-color: #fff; border-radius: 3px;}
        .form-section h4 { margin-top: 0; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input[type="text"], .form-group textarea {
            width: calc(100% - 12px); /* Account for padding */
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .form-group textarea { min-height: 60px; resize: vertical; }
        .form-editor-pane button {
            padding: 8px 12px; background-color: #007bff; color: white; border: none;
            border-radius: 3px; cursor: pointer; margin-right: 5px; margin-top:5px;
        }
        .form-editor-pane button.remove-btn { background-color: #dc3545; }
        .bullet-list li { display: flex; align-items: center; margin-bottom: 5px;}
        .bullet-list input { flex-grow: 1; margin-right: 5px; }
        /* Hide the original markdown editor pane */
        .editor-pane { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Resume Builder</h1>
        </header>

        <!-- NEW: Form-based UI Pane -->
        <section class="form-editor-pane">
            <h3>Edit Your Resume</h3>
            <div id="resume-form-container">
                <!-- Personal Info (Simplified) -->
                <div class="form-section" id="personal-info-section">
                    <h4>Personal Information</h4>
                    <div class="form-group">
                        <label for="resume-name">Full Name:</label>
                        <input type="text" id="resume-name" data-path="name">
                    </div>
                    <!-- More fields for contact, location etc. would go here -->
                </div>

                <!-- Experience Section -->
                <div class="form-section" id="experience-section">
                    <h4>Experience</h4>
                    <div id="experience-entries">
                        <!-- Experience entries will be dynamically added here -->
                    </div>
                    <button id="add-experience-btn">Add Experience</button>
                </div>

                <!-- Other sections (Education, Skills, etc.) would follow a similar pattern -->
            </div>
        </section>

        <!-- Markdown input (now hidden, but its value will be set by JS) -->
        <textarea id="markdown-input" style="display:none;">{{- initial_markdown | safe -}}</textarea>

        <main class="editor-layout">
            <!-- Original editor-pane is now hidden by CSS -->
            <section class="editor-pane">
                 <h2>Markdown Input</h2>
                 <textarea id="markdown-input-display-dummy" readonly placeholder="Markdown will appear here if needed for debug"></textarea>
            </section>

            <section class="preview-pane">
                <div class="preview-controls">
                    <h2>Resume Preview</h2>
                    <!-- Export PDF button will be added here by script.js -->
                </div>
                <div id="html-output" class="markdown-body"></div>
            </section>
        </main>

        <hr class="separator">
        <div id="status-message" style="text-align: center; margin-bottom: 15px; font-weight: bold;"></div>
        <article class="lorem-content">
            <h2>Sample Content Area</h2>
            <p>Lorem ipsum dolor sit amet...</p>
        </article>
        <footer>
            <p>© 2023 Your Awesome Editor</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

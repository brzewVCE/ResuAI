<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Markdown Resume Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body);"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Live Markdown Editor</h1>
            <p><em>(Resume template applied to preview)</em></p>
        </header>

        <main class="editor-layout">
            <section class="editor-pane">
                <div class="editor-controls"> <!-- Added a div for controls -->
                    <h2>Markdown Input</h2>
                    <!-- Reset button will be added here by script.js -->
                </div>
                <!-- Textarea starts empty -->
                <textarea id="markdown-input" placeholder="Type your Markdown here..."></textarea>
            </section>
            <section class="preview-pane">
                <div class="preview-controls"> <!-- Added a div for controls -->
                    <h2>HTML Preview</h2>
                    <!-- Export PDF button will be added here by script.js -->
                </div>
                <div id="html-output" class="markdown-body">
                    <!-- Rendered HTML will appear here -->
                </div>
            </section>
        </main>

        <hr class="separator">

        <footer>
            <p>© 2023 Your Awesome Editor</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
